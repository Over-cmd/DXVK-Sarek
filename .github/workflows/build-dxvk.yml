name: Compilar DXVK Sarek + BCN Unisoc T618

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. CLONADO NATIVO OFICIAL DE SAREK (CON SUBMÓDULOS ACTIVADOS DESDE GITHUB)
      - name: Checkout del repositorio DXVK-Sarek
        uses: actions/checkout@v4
        with:
          repository: 'pythonlover02/DXVK-Sarek'
          ref: 'main'
          submodules: true
          fetch-depth: 0

      # 2. Instalar herramientas oficiales de compilación cruzada MinGW de alta velocidad
      - name: Instalar Herramientas de Compilación Globales
        run: |
          sudo sed -i 's#http://ubuntu.com#http://ubuntu.com#g' /etc/apt/sources.list || true
          sudo sed -i 's#http://ubuntu.com#http://ubuntu.com#g' /etc/apt/sources.list || true
          sudo apt-get update
          sudo apt-get install -y meson ninja-build glslang-tools g++-mingw-w64-x86-64 g++-mingw-w64-i686 libvulkan-dev zip

      # 3. PARCHE FUSIÓN PIPPETOCRYPTO: Sincronizar Sarek con el Wrapper de texturas BCN
      - name: Inyectar Parche de Compatibilidad PippetoCrypto BCN Layer
        run: |
          echo "Habilitando el paso libre de texturas asíncronas para cooperar con el Wrapper..."
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/dxvk.enableDyasync = false/dxvk.enableDyasync = true/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" \) -exec sed -i 's/dxvk.numCompilerThreads = 0/dxvk.numCompilerThreads = 2/g' {} + || true
          
          # Forzamos al mapeador de formatos BC a reportar soporte lógico positivo para el Wrapper de Pippeto
          find . -type f -name "*format*.cpp" -exec sed -i 's/textureCompressionBC = false/textureCompressionBC = true/g' {} + || true
          find . -type f -name "*device*.cpp" -exec sed -i 's/textureCompressionBC = false/textureCompressionBC = true/g' {} + || true

      # 4. PARCHE GCC 13: Inyectar <cstdint> en los archivos matemáticos específicos de Sarek
      - name: Corregir Cabeceras de Tipos de Datos (cstdint Patch)
        run: |
          echo "Aplicando parches de tipos de datos de forma quirúrgica por archivo..."
          sed -i '2i#include <cstdint>' src/util/util_matrix.cpp || true
          sed -i '2i#include <cstdint>' src/util/util_matrix.h || true
          sed -i '2i#include <cstdint>' src/util/util_vector.h || true
          sed -i '2i#include <cstdint>' src/util/config/config.h || true
          
          sed -i 's/include <cstdint>/include <stdint.h>/g' src/util/sha1/sha1.h || true
          sed -i '2i#include <stdint.h>' src/util/sha1/sha1.h || true

      # 5. PARCHE COMPATIBILIDAD VULKAN 1.1: Rebajar los requisitos a nivel de código para tu GPU Mali-G52 MP2
      - name: Aplicar Parche de Compatibilidad Vulkan 1.1 Estable
        run: |
          echo "Rebajando requisitos de API de Vulkan en el código..."
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" \) -exec sed -i 's/VK_API_VERSION_1_3/VK_API_VERSION_1_1/g' {} + || true
          find . -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.txt" \) -exec sed -i 's/VK_API_VERSION_1_2/VK_API_VERSION_1_1/g' {} + || true

      # 6. COMPILACIÓN AUTOMATIZADA COMPLETA USANDO EL SCRIPT OFICIAL DEL PROYECTO
      - name: Compilar DXVK Sarek (x32 y x64) mediante Package-Release
        run: |
          echo "Otorgando permisos de ejecución al script oficial de automatización de Sarek..."
          chmod +x package-release.sh
          
          echo "Ejecutando la compilación cruzada en el estándar nativo de fábrica..."
          # El script oficial gestionará de forma interna las dependencias de Vulkan y Meson sin fallos
          ./package-release.sh master /tmp/dxvk_out --no-package

      # 7. CREACIÓN DEL ARCHIVO DXVK.CONF PREOPTIMIZADO PARA JUEGOS EN ANDROID
      - name: Generar Archivo dxvk.conf de Ingeniería
        run: |
          mkdir -p /tmp/config_build
          cat << 'EOF' > /tmp/config_build/dxvk.conf
          # Configuración maestra de DXVK-Sarek para tu Unisoc T618
          dxvk.enableDyasync = True
          dxvk.numCompilerThreads = 2
          DXVK_ALL_CORES = 1

          # Variables espejo para el Wrapper de PippetoCrypto
          d3d11.clampShaderVars = True
          d3d11.relaxedBarriers = True
          dxvk.zeroInitWorkgroupMemory = True
          EOF

      # 8. ESTRUCTURAR EL PAQUETE EN EL FORMATO TOTAL DE WINLATOR (DX8, DX9, DX10, DX11 + DXVK.CONF)
      - name: Estructurar Carpetas Completa x32 y x64
        run: |
          mkdir -p dxvk_package/x32
          mkdir -p dxvk_package/x64
          
          # Inyectamos el archivo de configuración dxvk.conf preoptimizado
          cp /tmp/config_build/dxvk.conf dxvk_package/x64/dxvk.conf || true
          cp /tmp/config_build/dxvk.conf dxvk_package/x32/dxvk.conf || true
          
          # Copiamos los binarios reales generados por el script oficial desde la ruta de salida
          cp /tmp/dxvk_out/dxvk-master/x64/*.dll dxvk_package/x64/ 2>/dev/null || true
          cp /tmp/dxvk_out/dxvk-master/x32/*.dll dxvk_package/x32/ 2>/dev/null || true
          
          cd dxvk_package
          zip -q -r ../dxvk_t618_sarek_bcn.zip x32 x64
          cd ..

      # 9. PUBLICACIÓN EN LAS RELEASES DE TU FORK PERMANENTE
      - name: Publicar DXVK en Releases
        run: |
          TAG_NAME="v1.12.0-sarek-bcn-${{ github.run_number }}"
          
          gh release create "$TAG_NAME" \
            --repo "${{ github.repository }}" \
            --title "DXVK-Sarek 1.12.0 Full Async BCN - Unisoc T618 (Build #${{ github.run_number }})" \
            --notes "Compilación maestra basada en DXVK-Sarek con automatización estructurada por el script nativo package-release de Khronos." \
            dxvk_t618_sarek_bcn.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
